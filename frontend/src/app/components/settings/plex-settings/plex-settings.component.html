<div class="top-margin">
  <!-- Status message -->
  <div *ngIf="statusMessage"
       class="alert mt-2"
       [class.alert-success]="statusType === 'success'"
       [class.alert-danger]="statusType === 'error'">
    {{ statusMessage }}
  </div>

  <!-- Step 1: Authenticate -->
  <div class="form-group mt-3">
    <h5 class="regular-text">Step 1: Authenticate</h5>
    <button class="btn btn-primary" type="button" (click)="authenticatePlexAccount()" [disabled]="loading">
      Authenticate Plex Account
    </button>
  </div>

  <!-- Step 2: Fetch Servers -->
  <div class="form-group mt-3">
    <h5 class="regular-text">Step 2: Fetch Servers</h5>
    <button class="btn btn-primary" type="button" (click)="fetchServers()" [disabled]="loading">
      Fetch Servers
    </button>
  </div>

  <!-- Step 3: Select Server -->
  <div class="form-group mt-3" *ngIf="servers.length > 0">
    <h5 class="regular-text">Step 3: Select Server</h5>
    <label for="serverList" class="text-muted">Plex Server</label>
    <select class="form-select dark-select" id="serverList" [(ngModel)]="selectedServer" (ngModelChange)="onServerSelect()">
      <option value="" disabled>Select a Plex server</option>
      <option *ngFor="let server of servers" [value]="server">{{ server }}</option>
    </select>
    <small class="form-text text-muted">These are Plex servers/devices on the signed-in account.</small>
  </div>

  <!-- Token display -->
  <div class="form-group mt-3" *ngIf="plexToken">
    <label class="text-muted">Plex Token</label>
    <div class="input-group">
      <input
        class="form-control dark-input"
        [type]="tokenVisible ? 'text' : 'password'"
        [value]="plexToken"
        readonly
      >
      <button class="btn btn-outline-secondary" type="button" (click)="togglePlexTokenVisibility()">
        {{ tokenVisible ? 'Hide' : 'Show' }}
      </button>
    </div>
  </div>

  <!-- Libraries found -->
  <div class="mt-3" *ngIf="libraries.length > 0">
    <h5 class="regular-text">Libraries Found</h5>
    <ul class="library-list">
      <li *ngFor="let lib of libraries" class="text-muted">{{ lib }}</li>
    </ul>
  </div>

  <!-- Save button -->
  <div class="mt-3" *ngIf="showSavePlexData">
    <button class="btn btn-success" (click)="setAsActivePlexServer()" [disabled]="loading">
      Set As Active Plex Server
    </button>
  </div>

  <!-- Active server info -->
  <div class="mt-4" *ngIf="activeServerInfo">
    <h5 class="regular-text">Current Active Server</h5>
    <p class="text-muted">{{ activeServerInfo }}</p>
  </div>

  <!-- Loading indicator -->
  <div *ngIf="loading" class="text-center mt-3">
    <div class="spinner"></div>
  </div>
</div>
