<div class="container top-margin">
  <h3 class="regular-text">Logs</h3>
  <p class="text-muted">View application logs for debugging and monitoring.</p>

  <!-- Controls -->
  <div class="d-flex flex-wrap align-items-center gap-3 mb-3">
    <div>
      <label class="text-muted me-1" style="font-size: 13px;">Level:</label>
      <select class="form-select form-select-sm dark-select d-inline-block" style="width: auto;"
              [(ngModel)]="filterLevel" (ngModelChange)="onFilterChange()">
        <option value="">All</option>
        <option *ngFor="let lvl of levels.slice(1)" [value]="lvl">{{ lvl }}</option>
      </select>
    </div>

    <input
      class="form-control form-control-sm dark-input"
      type="text"
      placeholder="Search logs..."
      [(ngModel)]="searchFilter"
      (ngModelChange)="onSearchChange()"
      style="max-width: 300px;"
    >

    <div class="d-flex gap-2 ms-auto">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="autoScroll"
               [(ngModel)]="autoScroll">
        <label class="form-check-label text-muted" for="autoScroll" style="font-size: 13px;">
          Auto-scroll
        </label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="autoRefresh"
               [checked]="autoRefresh" (change)="toggleAutoRefresh()">
        <label class="form-check-label text-muted" for="autoRefresh" style="font-size: 13px;">
          Auto-refresh
        </label>
      </div>
      <button class="btn btn-sm btn-outline-secondary" (click)="fetchLogs()">Refresh</button>
      <button class="btn btn-sm btn-outline-danger" (click)="clearLogs()">Clear</button>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="text-center mt-4">
    <div class="spinner"></div>
  </div>

  <!-- Log output -->
  <div *ngIf="!loading" class="log-viewer" #logContainer>
    <div *ngIf="filteredEntries.length === 0" class="text-muted text-center py-4">
      No log entries.
    </div>
    <div *ngFor="let entry of filteredEntries" class="log-line" [ngClass]="getLevelClass(entry.level)">
      <span class="log-timestamp">{{ entry.timestamp | date:'HH:mm:ss.SSS' }}</span>
      <span class="log-level">{{ entry.level }}</span>
      <span class="log-message">{{ entry.message }}</span>
    </div>
  </div>

  <div *ngIf="!loading" class="text-muted mt-2" style="font-size: 12px;">
    Showing {{ filteredEntries.length }} entries (buffer holds up to 500)
  </div>
</div>
