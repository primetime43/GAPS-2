name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Install Angular dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Angular frontend
        working-directory: frontend
        run: npm run build

      - name: Inject build info
        shell: bash
        run: echo "COMMIT = \"${{ github.sha }}\"" > backend/app/_build_info.py

      - name: Build Windows executable
        run: pyinstaller gaps2.spec --noconfirm

      - name: Rename executable with version
        run: mv dist/GAPS-2.exe dist/GAPS-2-${{ github.ref_name }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GAPS-2-windows
          path: dist/GAPS-2-${{ github.ref_name }}.exe

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: primetime43/gaps-2
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_COMMIT=${{ github.sha }}

  release:
    needs: [build-windows, build-docker]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: GAPS-2-windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: GAPS-2-${{ github.ref_name }}.exe
