name: Prune Develop Tags

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old develop-<sha> tags, keep newest 3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          REPO: primetime43/gaps-2
          KEEP: 3
        run: |
          set -euo pipefail

          TOKEN=$(curl -fsS -H "Content-Type: application/json" \
            -d "{\"username\":\"$DOCKERHUB_USERNAME\",\"password\":\"$DOCKERHUB_TOKEN\"}" \
            https://hub.docker.com/v2/users/login/ | jq -r .token)

          TAGS=$(curl -fsS -H "Authorization: JWT $TOKEN" \
            "https://hub.docker.com/v2/repositories/$REPO/tags/?page_size=100" \
            | jq -r '.results
                     | map(select(.name | test("^develop-[a-f0-9]+$")))
                     | sort_by(.last_updated) | reverse
                     | .[].name')

          echo "$TAGS" | tail -n +$((KEEP + 1)) | while read -r tag; do
            [ -z "$tag" ] && continue
            echo "Deleting $tag"
            curl -fsS -X DELETE -H "Authorization: JWT $TOKEN" \
              "https://hub.docker.com/v2/repositories/$REPO/tags/$tag/"
          done
